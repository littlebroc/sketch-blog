{{ define "main" }}
    {{ .Content }}
    <div class="time-list">
        <ul>
            {{ range site.RegularPages }}
            <li>
                <span>{{- partial "date" .Date -}}</span>
                <div>
                  <a href="{{ .RelPermalink }}">{{ partial "titre.html" . }}</a>
                </div>
            </li>
            {{ end }}
        </ul>
    </div>
{{ end }}
